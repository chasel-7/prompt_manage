server:
  port: 8080

spring:
  profiles:
    active: h2

  # H2 profile (default for development)
  datasource:
    url: jdbc:h2:file:./data/prompt_manage;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# AI 配置（阿里云百炼 - 通义千问 Max）
ai:
  api-key: ${AI_API_KEY:sk-32bfe31bf9794b398c5f39e4d67d9a2f}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
  model: ${AI_MODEL:qwen-max}
  max-retries: 3
  timeout-seconds: 60
